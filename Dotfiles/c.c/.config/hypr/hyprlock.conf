# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.jpg
    blur_passes = 1 # Немного сильнее размытие для чистоты
    contrast = 1.0
    brightness = 0.5 # Сделал темнее, чтобы зеленый текст "горел"
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(0, 255, 0, 0.9) # Твой ярко-зеленый
    font_size = 90
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(200, 255, 200, 0.8)
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(0, 255, 0, 0.8)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor =
    path = $HOME/.config/hypr/vivek.png
    border_size = 3
    border_color = rgba(0, 255, 0, 0.8) # Зеленая рамка
    size = 130
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(0, 0, 0, 0.4) # Полупрозрачный черный
    rounding = 15
    border_size = 2
    border_color = rgba(0, 255, 0, 0.5) # Зеленая обводка
    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(0, 255, 0, 0.9)
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 255, 0, 0.6) # Зеленая рамка поля
    inner_color = rgba(0, 0, 0, 0.5)   # Темный фон внутри
    font_color = rgb(0, 255, 0)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##00ff0099">Enter Pass...</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}
