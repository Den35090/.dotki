# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.png # Убедись, что новые обои лежат здесь
    blur_passes = 2 # Немного усилил размытие для лучшей читаемости текста
    contrast = 1.0
    brightness = 0.7 # Сделал чуть светлее, чтобы подчеркнуть синеву космоса
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Day (Основной акцент - цвет волос/платья)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(216, 191, 216, 0.9) # Нежный лавандовый (цвета Mahiru)
    font_size = 90
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
    # Добавил свечение, как у звезд
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(255, 255, 255, 0.4)
}

# Date-Month (Цвет звездного света)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(240, 248, 255, 0.8) # Ледяной белый/голубой
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time (Цвет глубокого космоса)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(75, 0, 130, 0.8) # Индиго (насыщенный сине-фиолетовый)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor =
    path = $HOME/.config/hypr/vivek.png
    border_size = 3
    border_color = rgba(216, 191, 216, 0.8) # Лавандовая рамка
    size = 130
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(10, 10, 35, 0.5) # Темно-синий, почти черный (цвет космоса)
    rounding = 15
    border_size = 2
    border_color = rgba(216, 191, 216, 0.5) # Лавандовая обводка
    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(216, 191, 216, 0.9) # Лавандовый текст
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(75, 0, 130, 0.6) # Индиго рамка поля
    inner_color = rgba(10, 10, 35, 0.6) # Темно-синий фон внутри
    font_color = rgb(216, 191, 216)      # Лавандовый цвет ввода
    fade_on_empty = false
    placeholder_text = <i><span foreground="#d8bfd899">Enter Pass...</span></i> # Лавандовый плейсхолдер
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}