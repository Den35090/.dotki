# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.png
    blur_passes = 1
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(59, 130, 246, 0.9) # Электрический синий
    font_size = 90
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(224, 231, 255, 0.8) # Нежно-белый
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(59, 130, 246, 0.8) # Электрический синий
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor =
    path = $HOME/.config/hypr/vivek.png
    border_size = 3
    border_color = rgba(59, 130, 246, 0.8) # Электрический синий
    size = 130
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = rgba(5, 10, 20, 0.6) # Глубокий ночной синий
    rounding = 15
    border_size = 2
    border_color = rgba(71, 85, 105, 0.8) # Стальной сизый
    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = rgba(224, 231, 255, 0.9) # Нежно-белый
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(59, 130, 246, 0.6) # Электрический синий
    inner_color = rgba(5, 10, 20, 0.6)   # Глубокий ночной синий
    font_color = rgb(224, 231, 255)       # Нежно-белый
    fade_on_empty = false
    placeholder_text = <i><span foreground="##e0e7ff99">Enter Pass...</span></i> 
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}